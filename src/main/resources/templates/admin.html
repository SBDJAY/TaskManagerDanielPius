<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand">TaskManager</span>

        <div class="text-white d-flex align-items-center">

            <span class="me-3">
                <b th:text="${#authentication.name}"></b>
            </span>

            <span class="badge bg-danger me-3"
                  th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>

    <h2 class="text-danger">Admin Dashboard</h2>

    <ul class="list-group">
        <li th:each="task : ${tasks}"
            class="list-group-item d-flex justify-content-between"
            th:classappend="${task.completed} ? 'list-group-item-success'">

            <div>
                <b th:text="${task.title}"
                   th:style="${task.completed} ? 'text-decoration: line-through;' : ''"></b>
                <br>
                <small th:text="${task.description}"></small><br>
                <small class="text-muted">
                    Owner: <span th:text="${task.ownerUsername}"></span>
                </small>
            </div>

            <form th:action="@{'/admin/delete/' + ${task.id}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn btn-danger btn-sm">Delete</button>
            </form>
        </li>
    </ul>
</div>

</body>
</html>
