<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>User Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">

    <span class="navbar-brand">TaskManager</span>

    <div class="text-white d-flex align-items-center">

            <span class="me-3">
                <b th:text="${#authentication.name}"></b>
            </span>

      <!-- ✅ FIXED ROLE -->
      <span class="badge bg-primary me-3"
            th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">
            </span>

      <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- ✅ BACK BUTTON -->
  <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>

  <h2>Your Tasks</h2>

  <!-- ADD TASK -->
  <form th:action="@{/user/add}" th:object="${task}" method="post" class="mb-3">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="Title" required>
    <input type="text" th:field="*{description}" class="form-control mb-2" placeholder="Description" required>

    <button class="btn btn-primary">Add Task</button>
  </form>

  <!-- TASK LIST -->
  <ul class="list-group">
    <li th:each="task : ${tasks}"
        class="list-group-item d-flex justify-content-between"
        th:classappend="${task.completed} ? 'list-group-item-success'">

      <div>
        <b th:text="${task.title}"
           th:style="${task.completed} ? 'text-decoration: line-through;' : ''"></b>
        <br>
        <small th:text="${task.description}"></small>
      </div>

      <form th:action="@{'/user/complete/' + ${task.id}}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-success btn-sm"
                th:disabled="${task.completed}">
          Complete
        </button>
      </form>
    </li>
  </ul>
</div>

</body>
</html>
