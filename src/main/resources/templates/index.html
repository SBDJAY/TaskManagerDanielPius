<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand">TaskManager</span>

        <div class="text-white d-flex align-items-center">

            <span class="me-3">
                <b th:text="${#authentication.name}"></b>
            </span>

            <span class="badge bg-danger me-3"
                  th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5 text-center">
    <h1>Task Manager</h1>
    <p>Select your dashboard</p>

    <a href="/user/tasks" class="btn btn-primary m-2">User Dashboard</a>
    <a href="/admin/tasks" class="btn btn-danger m-2">Admin Dashboard</a>
</div>

</body>
</html>
