<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">TaskManager</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/user/tasks">User</a>
            <a class="nav-link" href="/admin/tasks">Admin</a>
        </div>

        <div class="d-flex align-items-center text-white">
            <span class="me-3"><b th:text="${#authentication.name}"></b></span>

            <span class="badge ms-2"
                  th:classappend="${#authorization.expression('hasRole(''ADMIN'')')} ? 'bg-danger' : 'bg-primary'"
                  th:text="${#authorization.expression('hasRole(''ADMIN'')')} ? 'ADMIN' : 'USER'">
            </span>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <h2>Your Tasks</h2>

    <form th:action="@{/user/add}" th:object="${task}" method="post" class="mb-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="Title" required>
        <input type="text" th:field="*{description}" class="form-control mb-2" placeholder="Description" required>

        <button class="btn btn-primary">Add Task</button>
    </form>

    <ul class="list-group">
        <li th:each="task : ${tasks}"
            class="list-group-item d-flex justify-content-between align-items-center"
            th:classappend="${task.completed} ? 'list-group-item-success'">

            <div>
                <b th:text="${task.title}"
                   th:style="${task.completed} ? 'text-decoration: line-through;' : ''"></b>
                <br>
                <small th:text="${task.description}"></small><br>
                <small class="text-muted">Owner: <span th:text="${task.ownerUsername}"></span></small>
            </div>

            <form th:action="@{'/user/complete/' + ${task.id}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button class="btn btn-success btn-sm"
                        th:disabled="${task.completed}">
                    Complete
                </button>
            </form>
        </li>
    </ul>
</div>

</body>
</html>
